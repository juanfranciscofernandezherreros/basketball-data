name: Delete MD Files

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: list files that would be deleted without actually deleting them'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  delete-md-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List .md files to be deleted
        run: |
          echo "The following .md files would be deleted:"
          find . ! -path './.git/*' ! -path './.github/*' -name '*.md' -type f

      - name: Remove all .md files (except in .github and .git)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          find . ! -path './.git/*' ! -path './.github/*' -name '*.md' -type f -delete

      - name: Commit and push changes
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No .md files to delete."
          else
            git commit -m "chore: remove all .md files from repository"
            git push
          fi
